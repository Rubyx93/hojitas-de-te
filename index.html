<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BookCloud ✨ Escritorio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffeef8; 
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background-color: #ffc1e3 !important;
            border-bottom: 4px solid #ff99cc;
        }
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .kawaii-card {
            background: white;
            border: 3px solid #ffc1e3;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 600px; /* Un poco más ancha para escribir mejor */
            box-shadow: 0 10px 25px rgba(255, 153, 204, 0.2);
        }
        h2 { color: #ff66aa; font-weight: 700; }
        .form-control {
            border-radius: 15px;
            border: 2px solid #ffc1e3;
            margin-bottom: 15px;
        }
        .btn-kawaii {
            background-color: #ff99cc;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        .btn-kawaii:hover {
            background-color: #ff66aa;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-0">
        <div class="container justify-content-center">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span style="font-size: 1.8rem; margin-right: 10px;">🌸</span>
                <strong>BookCloud ✨</strong>
            </a>
        </div>
    </nav>

    <div class="main-container">
        <div class="kawaii-card text-center">
            <h2 class="mb-4">✨ Cuéntanos tu historia ✨</h2>
            
            <form action="/books/upload-text" method="POST">
                <input type="text" name="title" class="form-control" placeholder="Título mágico..." required>
                <textarea name="content" class="form-control" rows="8" placeholder="Escribe aquí tus sueños..." style="resize: none;" required></textarea>
                <button type="submit" class="btn btn-kawaii">💖 ¡Publicar ahora! 💖</button>
            </form>
            
            <div class="mt-3">
                <a href="/login" style="color: #ff99cc; text-decoration: none; font-size: 0.9rem;">Cerrar sesión</a>
            </div>
        </div>
    </div>

</body>
</html>
