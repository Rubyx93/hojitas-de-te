<body class="bg-light d-flex align-items-center vh-100">
    <div class="container card p-4 shadow-sm" style="max-width: 400px;">
        <h2 class="text-center mb-4">Crear Cuenta</h2>
        <form action="/auth/register" method="POST">
            <input type="text" name="name" class="form-control mb-3" placeholder="Nombre" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>
            <button class="btn btn-primary w-100">Registrarme</button>
        </form>
        <p class="mt-3 text-center">¿Ya tienes cuenta? <a href="/login">Entra aquí</a></p>
    </div>
</body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/">
    <span style="font-size: 2rem; margin-right: 10px; filter: drop-shadow(0 0 5px white);">🌸</span> 
    <strong style="font-size: 1.5rem;">BookCloud ✨</strong>
</a>
        
        <div class="ms-auto">
            <a href="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
            <a href="/registro" class="btn btn-primary btn-sm">Registrarse</a>
        </div>
    </div>
</nav>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
    body {
        background-color: #ffeef8; /* Rosa muy clarito */
        font-family: 'Quicksand', sans-serif;
        color: #835a70;
    }

    .navbar {
        background-color: #ffc1e3 !important; /* Rosa pastel chicle */
        border-bottom: 5px solid #ff99cc;
    }

    .card {
        background-color: #ffffff;
        border: 3px solid #ffc1e3 !important;
        border-radius: 30px !important; /* Bordes muy redondeados */
        box-shadow: 0 10px 20px rgba(255, 153, 204, 0.2);
    }

    h2, strong {
        color: #ff66aa;
        text-shadow: 1px 1px 2px #fff;
    }

    .btn-primary, .btn-success {
        background-color: #ff99cc !important;
        border: none !important;
        border-radius: 20px !important;
        font-weight: bold;
        transition: transform 0.2s;
    }

    .btn-primary:hover {
        transform: scale(1.05); /* Efecto de rebote al pasar el ratón */
        background-color: #ff66aa !important;
    }

    .form-control {
        border-radius: 15px;
        border: 2px solid #ffc1e3;
    }

    .form-control:focus {
        border-color: #ff66aa;
        box-shadow: 0 0 10px rgba(255, 102, 170, 0.3);
    }
</style>
