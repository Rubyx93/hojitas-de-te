<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicar ✨ BookCloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffeef8; font-family: 'Quicksand', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .kawaii-card { background: white; border: 3px solid #ffc1e3; border-radius: 30px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(255, 153, 204, 0.2); text-align: center; }
        h2 { color: #ff66aa; margin-bottom: 25px; }
        .form-control { border-radius: 15px; border: 2px solid #ffc1e3; margin-bottom: 15px; }
        .btn-upload { background-color: #ff99cc; color: white; border: none; border-radius: 20px; padding: 12px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-upload:hover { background-color: #ff66aa; transform: scale(1.03); }
        .back-link { display: block; margin-top: 15px; color: #ff99cc; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="kawaii-card">
        <h2>✨ Nueva Obra ✨</h2>
        <form action="/books/upload-text" method="POST">
            <input type="text" name="title" class="form-control" placeholder="Título de tu libro..." required>
            <input type="url" name="image_url" class="form-control" placeholder="URL de la imagen de portada..." required>
            <textarea name="content" class="form-control" rows="6" placeholder="Escribe tu historia aquí..." style="resize: none;" required></textarea>
            <button type="submit" class="btn-upload">💖 Publicar en la Galería 💖</button>
        </form>
        <a href="/" class="back-link">⬅ Volver a la estantería</a>
    </div>

</body>
</html>
